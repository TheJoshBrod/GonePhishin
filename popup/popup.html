<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <span class="logo">🛡️</span>
    <h1>PhishGuard</h1>
  </div>

  <div id="status-card" class="card">
    <div id="status-icon" class="status-icon">⏳</div>
    <div id="status-label" class="status-label">Analyzing...</div>
    <div id="status-reason" class="status-reason"></div>
  </div>

  <div class="meta">
    <span id="confidence-badge" class="badge hidden"></span>
    <span id="analyzed-at" class="timestamp"></span>
  </div>

  <div class="actions">
    <button id="reanalyze-btn">Re-analyze page</button>
    <a id="options-link" href="#">Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
